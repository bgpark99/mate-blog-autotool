<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이트 블로그 콘텐츠 생성기</title>
  <link rel="icon" type="image/png" href="/mate-favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#EEEEEE] min-h-screen py-10 px-4 font-sans text-[#171717]">
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-md border border-[#DADADA] p-8">
    
    <div class="flex items-center gap-3 mb-8 pb-4 border-b border-[#DADADA]">
      <img src="/mate-symbol.png" alt="MATE Logo" class="h-10 object-contain">
      <h1 class="text-2xl font-extrabold text-[#171717]">
        메이트 블로그 콘텐츠 생성기
      </h1>
    </div>

    <form id="generatorForm" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-[#434343] mb-2">1. 게시판 선택</label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <label class="border border-[#DADADA] rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="category" value="도입사례" checked class="text-[#171717] focus:ring-[#FCF56A]"> <span class="text-sm font-medium">도입 사례</span>
          </label>
          <label class="border border-[#DADADA] rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="category" value="메이트소식" class="text-[#171717] focus:ring-[#FCF56A]"> <span class="text-sm font-medium">메이트 소식</span>
          </label>
          <label class="border border-[#DADADA] rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="category" value="메이트TV" class="text-[#171717] focus:ring-[#FCF56A]"> <span class="text-sm font-medium">메이트 TV</span>
          </label>
          <label class="border border-[#DADADA] rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:bg-gray-50 transition-colors">
            <input type="radio" name="category" value="기타" class="text-[#171717] focus:ring-[#FCF56A]"> <span class="text-sm font-medium">기타 (범용)</span>
          </label>
        </div>
      </div>

      <div>
        <label for="title" class="block text-sm font-bold text-[#434343] mb-2">2. 콘텐츠 제목 초안 (AI가 더 멋지게 변경해 줍니다)</label>
        <input type="text" id="title" required placeholder="예: 강남 피자 맛집 OOO의 메이트 QR오더 도입 후기" 
          class="w-full border border-[#DADADA] rounded-lg p-3 text-sm focus:ring-2 focus:ring-[#FCF56A] focus:border-[#FCF56A] outline-none transition-all">
      </div>

      <div>
        <label for="additionalRequests" class="block text-sm font-bold text-[#434343] mb-2">3. 추가 정보 입력 (콘텐츠 방향성, 추가 요청 사항 등)</label>
        <textarea id="additionalRequests" rows="4" required placeholder="예: 매장명, 사장님과의 인터뷰 내용, 어떤 부분을 강조했으면 좋겠는지, 꼭 들어가야 하는 문구나 내용 등" 
          class="w-full border border-[#DADADA] rounded-lg p-3 text-sm focus:ring-2 focus:ring-[#FCF56A] focus:border-[#FCF56A] outline-none transition-all"></textarea>
      </div>

      <div>
        <label class="block text-sm font-bold text-[#434343] mb-2">4. 이미지 업로드 (AI가 맥락에 맞춰 자유롭게 배치합니다)</label>
        <input type="file" id="imageInput" multiple accept="image/*" class="block w-full text-sm text-[#434343] file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#EEEEEE] file:text-[#171717] hover:file:bg-[#DADADA] cursor-pointer mb-3 transition-colors">
        
        <div id="previewContainer" class="flex flex-wrap gap-4 mt-2 p-4 bg-gray-50 rounded-lg min-h-[100px] border border-dashed border-[#DADADA]">
          <p class="text-xs text-gray-400 w-full text-center my-auto" id="previewPlaceholder">선택된 이미지가 없습니다.</p>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-[#FCF56A] hover:bg-[#eade58] text-[#171717] font-extrabold py-3 px-4 rounded-lg transition-colors shadow-sm">
        ✨ AI 콘텐츠 생성하기
      </button>
    </form>

    <div id="loading" class="hidden mt-8 text-center py-8">
      <div class="animate-spin inline-block w-8 h-8 border-4 border-[#171717] border-t-transparent rounded-full mb-3"></div>
      <p class="text-sm font-bold text-[#434343]">AI가 이미지를 분석하고 MATE의 톤앤매너로 글을 작성 중입니다...</p>
    </div>

    <div id="resultArea" class="hidden mt-10 border-t border-[#DADADA] pt-8">
      <div class="flex justify-between items-center mb-4">
        <div class="flex gap-2 bg-[#EEEEEE] p-1 rounded-lg">
          <button id="tabPreview" class="px-4 py-1.5 text-sm font-bold rounded-md bg-white shadow-sm text-[#171717]">결과 미리보기</button>
          <button id="tabSource" class="px-4 py-1.5 text-sm font-bold rounded-md text-[#434343] hover:text-[#171717]">HTML 소스코드</button>
        </div>
        <button id="copyBtn" class="bg-[#171717] hover:bg-[#434343] text-[#FCF56A] text-xs font-bold py-2 px-4 rounded-md transition-colors">
          📋 코드 복사
        </button>
      </div>

      <div id="contentPreview" class="prose max-w-none border border-[#DADADA] rounded-xl p-6 bg-white min-h-[400px]"></div>
      <textarea id="contentSource" readonly class="hidden w-full font-mono text-sm border border-[#DADADA] rounded-xl p-6 bg-[#EEEEEE] text-[#171717] min-h-[400px]"></textarea>
    </div>
  </div>

  <script>
    let selectedImages = [];
    let compressedImagesData = [];

    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewPlaceholder = document.getElementById('previewPlaceholder');

    const resizeImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1024;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve({ data: canvas.toDataURL('image/jpeg', 0.8), mimeType: 'image/jpeg' });
          };
        };
      });
    };

    imageInput.addEventListener('change', async (e) => {
      for (let file of e.target.files) {
        selectedImages.push(file);
        const compressed = await resizeImage(file);
        compressedImagesData.push(compressed);
      }
      renderPreviews();
      imageInput.value = "";
    });

    function renderPreviews() {
      previewContainer.innerHTML = "";
      if (compressedImagesData.length === 0) {
        previewContainer.appendChild(previewPlaceholder);
        return;
      }
      compressedImagesData.forEach((img, index) => {
        const div = document.createElement('div');
        div.className = "relative w-24 h-24 shadow-sm rounded-lg border border-[#DADADA] bg-white p-1";
        div.innerHTML = `
          <img src="${img.data}" class="w-full h-full object-cover rounded-md">
          <button type="button" onclick="removeImage(${index})" class="absolute -top-2 -right-2 bg-[#171717] text-[#FCF56A] rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold hover:bg-black shadow-md transition-colors">X</button>
        `;
        previewContainer.appendChild(div);
      });
    }

    window.removeImage = function(index) {
      selectedImages.splice(index, 1);
      compressedImagesData.splice(index, 1);
      renderPreviews();
    };

    const form = document.getElementById('generatorForm');
    let finalHtmlSource = "";

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('resultArea').classList.add('hidden');

      const category = document.querySelector('input[name="category"]:checked').value;
      const title = document.getElementById('title').value;
      const additionalRequests = document.getElementById('additionalRequests').value;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, title, additionalRequests, images: compressedImagesData })
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.error);

        let aiHtml = result.html;

        let previewHtml = aiHtml;
        let sourceCodeHtml = aiHtml;

        compressedImagesData.forEach((img, index) => {
          const targetStr = `IMAGE_${index}`;
          previewHtml = previewHtml.replace(targetStr, img.data);
          sourceCodeHtml = sourceCodeHtml.replace(targetStr, `[아임웹 에디터에서 ${index + 1}번째 이미지 원본을 직접 업로드해주세요]`);
        });

        finalHtmlSource = sourceCodeHtml;
        document.getElementById('contentPreview').innerHTML = previewHtml;
        document.getElementById('contentSource').value = sourceCodeHtml;

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
      } catch (error) {
        alert(error.message);
        document.getElementById('loading').classList.add('hidden');
      } finally {
        document.getElementById('submitBtn').disabled = false;
      }
    });

    const tabPreview = document.getElementById('tabPreview');
    const tabSource = document.getElementById('tabSource');
    const contentPreview = document.getElementById('contentPreview');
    const contentSource = document.getElementById('contentSource');

    tabPreview.addEventListener('click', () => {
      tabPreview.className = "px-4 py-1.5 text-sm font-bold rounded-md bg-white shadow-sm text-[#171717]";
      tabSource.className = "px-4 py-1.5 text-sm font-bold rounded-md text-[#434343] hover:text-[#171717]";
      contentPreview.classList.remove('hidden');
      contentSource.classList.add('hidden');
    });

    tabSource.addEventListener('click', () => {
      tabSource.className = "px-4 py-1.5 text-sm font-bold rounded-md bg-white shadow-sm text-[#171717]";
      tabPreview.className = "px-4 py-1.5 text-sm font-bold rounded-md text-[#434343] hover:text-[#171717]";
      contentSource.className = "px-4 py-1.5 text-sm font-bold rounded-md text-[#434343] hover:text-[#171717]";
      contentSource.classList.remove('hidden');
      contentPreview.classList.add('hidden');
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(finalHtmlSource).then(() => {
        alert("코드가 복사되었습니다! 아임웹 소스코드(HTML) 모드에 붙여넣으시고, 안내된 위치에 이미지를 업로드하세요.");
      });
    });
  </script>
</body>
</html>
